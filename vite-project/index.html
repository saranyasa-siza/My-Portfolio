  <body>
    <script>
      (function() {
        var theme = localStorage.getItem('theme');
        if (theme === 'light') {
          document.documentElement.classList.remove('dark');
        } else {
          document.documentElement.classList.add('dark');
          if (!theme) localStorage.setItem('theme', 'dark');
        }
      })();
    </script>

  </body>
